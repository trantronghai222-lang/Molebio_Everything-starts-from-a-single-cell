<style>
    body {
        background-color: #008273;
    }

    .blog-detail-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .blog-header {
        margin-bottom: 30px;
    }

    .blog-title {
        color: var(--primary-dark);
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0 0 15px 0;
        line-height: 1.3;
        animation: fadeIn 0.6s ease-in;
    }

    .blog-meta {
        color: var(--accent-green);
        font-size: 1rem;
        margin: 0;
        animation: fadeIn 0.6s ease-in 0.1s both;
    }

    .blog-divider {
        height: 2px;
        background: linear-gradient(to right, var(--accent-green), transparent);
        border: none;
        margin: 25px 0;
        animation: fadeIn 0.6s ease-in 0.2s both;
    }

    .blog-main-image {
        width: 100%;
        height: auto;
        border-radius: 12px;
        margin: 30px 0;
        display: none;
        object-fit: cover;
        animation: fadeIn 0.8s ease-in 0.3s both;
    }

    .blog-content {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #333;
        margin-bottom: 40px;
        animation: fadeIn 0.8s ease-in 0.4s both;
    }

    .blog-content p {
        margin: 0 0 18px 0;
    }

    .blog-content p:last-child {
        margin-bottom: 0;
    }

    .gallery-section {
        margin-top: 50px;
    }

    .gallery-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 40px;
    }

    .gallery-item {
        animation: fadeIn 0.8s ease-in 0.5s both;
    }

    .gallery-image {
        width: 100%;
        height: auto;
        border-radius: 12px;
        display: block;
        margin-bottom: 15px;
        transition: transform 0.3s ease;
        cursor: pointer;
    }

    .gallery-image:hover {
        transform: scale(1.02);
    }

    .gallery-caption {
        font-size: 0.95rem;
        line-height: 1.7;
        color: #555;
        text-align: justify;
    }

    @media (max-width: 768px) {
        .blog-title {
            font-size: 2rem;
        }

        .gallery-grid {
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .blog-detail-container {
            padding: 20px 15px;
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<section class="section" style="margin-top: 60px; margin-bottom: 60px;">
    <div class="blog-detail-container">
        <div class="blog-header">
            <h1 class="blog-title" id="detail-title"></h1>
            <p class="blog-meta" id="detail-date"></p>
            <hr class="blog-divider">
        </div>

        <img id="detail-img" src="" class="blog-main-image" alt="">

        <div class="blog-content" id="detail-text"></div>

        <div class="gallery-section" id="gallery-section" style="display: none;">
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>
    </div>
</section>

<script>
    const data = JSON.parse(localStorage.getItem('currentBlog'));

    if (data) {
        // Tiêu đề
        document.getElementById('detail-title').innerText = data.title;

        // Ngày
        document.getElementById('detail-date').innerText = "Đăng ngày: " + data.date;

        // Hình ảnh chính
        if (data.image) {
            const img = document.getElementById('detail-img');
            img.src = data.image;
            img.style.display = 'block';
        }

        // Nội dung bài viết
        document.getElementById('detail-text').innerHTML = data.content;

        // 2 ảnh kèm caption
        if ((data.image1 && data.caption1) || (data.image2 && data.caption2)) {
            const gallerySection = document.getElementById('gallery-section');
            const galleryGrid = document.getElementById('gallery-grid');
            
            galleryGrid.innerHTML = '';

            if (data.image1 && data.caption1) {
                const item1 = document.createElement('div');
                item1.className = 'gallery-item';
                item1.innerHTML = `
                    <img src="${data.image1}" alt="Ảnh 1" class="gallery-image">
                    <p class="gallery-caption">${data.caption1}</p>
                `;
                galleryGrid.appendChild(item1);
            }

            if (data.image2 && data.caption2) {
                const item2 = document.createElement('div');
                item2.className = 'gallery-item';
                item2.innerHTML = `
                    <img src="${data.image2}" alt="Ảnh 2" class="gallery-image">
                    <p class="gallery-caption">${data.caption2}</p>
                `;
                galleryGrid.appendChild(item2);
            }

            gallerySection.style.display = 'block';
        }
    }
</script>
