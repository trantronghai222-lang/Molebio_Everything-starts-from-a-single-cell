        ]
    };

    let currentCategory = "tiensi"; 
    let currentIndex = 0;
    let images = galleryData[currentCategory];

    // 2. HÀM CẬP NHẬT GIAO DIỆN
    function updateGallery() {
        const imgElement = document.getElementById('current-img');
        const bgElement = document.getElementById('dynamic-bg');
        const data = images[currentIndex];

        if(!data) return; // Phòng lỗi nếu mảng rỗng

        imgElement.style.opacity = 0;
        
        setTimeout(() => {
            imgElement.src = data.src;
            bgElement.style.backgroundImage = `url('${data.src}')`;
            document.getElementById('img-title').innerText = data.title;
            document.getElementById('img-date').innerHTML = `<i class="far fa-calendar-alt"></i> ${data.date}`;
            document.getElementById('img-desc').innerText = data.desc;
            imgElement.style.opacity = 1;

            // Làm sáng thumbnail đang chọn
            const thumbs = document.querySelectorAll('.thumb-bar img');
            thumbs.forEach((t, i) => t.className = i === currentIndex ? 'active' : '');
        }, 300);
    }

    // 3. HÀM CHUYỂN NHÁNH (Tiến sĩ <-> Chuồn chuồn)
    function switchCategory(cat) {
        currentCategory = cat;
        images = galleryData[currentCategory];
        currentIndex = 0;
        
        // Đổi trạng thái nút bấm
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        renderThumbnails();
        updateGallery();
    }

    // 4. HÀM TẠO ẢNH NHỎ
    function renderThumbnails() {
        const thumbBar = document.getElementById('thumb-bar');
        thumbBar.innerHTML = ""; 
        images.forEach((img, index) => {
            const thumb = document.createElement('img');
            thumb.src = img.src;
            thumb.onclick = () => { currentIndex = index; updateGallery(); };
            thumbBar.appendChild(thumb);
        });
    }

    function changeImage(step) {
        currentIndex = (currentIndex + step + images.length) % images.length;
        updateGallery();
    }

    // 5. LIGHTBOX
    function openLightbox() {
        document.getElementById('lightbox-img').src = images[currentIndex].src;
        document.getElementById('lightbox').style.display = "flex";
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = "none";
    }

    // KHỞI TẠO LẦN ĐẦU
    renderThumbnails();
    updateGallery();
</script>
