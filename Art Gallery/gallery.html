<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh - Mole-Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <div id="dynamic-bg" class="bg-blur"></div>

    <div class="gallery-wrapper">
        <div class="category-menu">
    <button class="cat-btn active" onclick="switchCategory('tiensi')">Nhánh Tiến sĩ (17)</button>
    <button class="cat-btn" onclick="switchCategory('chuonchuon')">Nhánh Chuồn chuồn (13)</button>
</div>
        <div class="glass-container">
            
            <a href="../index.html" class="back-home"><i class="fas fa-arrow-left"></i> Quay lại</a>

            <div class="main-display">
                <button class="nav-btn prev" onclick="changeImage(-1)"><i class="fas fa-chevron-left"></i></button>
                
                <div class="image-box" onclick="openLightbox()">
    <img id="current-img" src="anh1.jpg" alt="Gallery Image">
    <div class="hover-hint"><i class="fas fa-search-plus"></i> Click để phóng to</div>
</div>

                <button class="nav-btn next" onclick="changeImage(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="thumb-bar" id="thumb-bar">
    </div>

            <div class="image-info">
                <div class="info-header">
                    <span id="img-date" class="date-tag"><i class="far fa-calendar-alt"></i> 15/03/2026</span>
                </div>
                <h2 id="img-title">Tiêu đề ảnh</h2>
                <p id="img-desc">Mô tả chi tiết về bức ảnh này sẽ hiện ở đây. Bạn có thể ghi chú về quá trình thí nghiệm hoặc kỷ niệm chụp ảnh.</p>
            </div>

        </div>
    </div>

    <script>
        // DỮ LIỆU ẢNH CỦA BẠN (Thay đổi ở đây)
        const galleryData = {
    "tiensi": [
        { src: "ts1.jpg", title: "Tiến sĩ A", date: "10/03/2026", desc: "Mô tả ảnh 1 về tiến sĩ..." },
        // ... Thêm đủ 17 ảnh vào đây
        { src: "ts17.jpg", title: "Tiến sĩ Z", date: "12/03/2026", desc: "Mô tả ảnh 17..." }
    ],
    "chuonchuon": [
        { src: "a bunch of pp.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
        { src: "chị di.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
        { src: "cô thảo nè.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
        { src: "tim.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
        { src: "dụng cụ.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
         {src: "tim in progress.jpg", title: "Chuồn chuồn kim", date: "15/03/2026", desc: "Mô tả ảnh 1 về chuồn chuồn..." },
        // ... Thêm đủ 13 ảnh vào đây
        { src: "cc13.jpg", title: "Chuồn chuồn ngô", date: "18/03/2026", desc: "Mô tả ảnh 13..." }
    ]
};

let currentCategory = "tiensi"; // Mặc định hiện nhánh Tiến sĩ trước
let currentIndex = 0;
let images = galleryData[currentCategory]; // Lấy danh sách ảnh của nhánh hiện tại

            // Hiệu ứng mờ dần khi đổi ảnh
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = data.src;
                bgElement.style.backgroundImage = `url('${data.src}')`;
                document.getElementById('img-title').innerText = data.title;
                document.getElementById('img-date').innerHTML = `<i class="far fa-calendar-alt"></i> ${data.date}`;
                document.getElementById('img-desc').innerText = data.desc;
                imgElement.style.opacity = 1;
            }, 300);
        }

        function changeImage(step) {
            currentIndex += step;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            updateGallery();
        }

        // Khởi tạo lần đầu
        updateGallery();
    </script>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img">
</div>
    <script src="gallery.js"></script>
</body>
</html>
